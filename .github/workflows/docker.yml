#
# Build the root Dockerfile and push to GitHub Container Registry (GHCR).
#
# Images (always lowercase — GHCR requirement):
#   ghcr.io/<owner>/<repo>:<tag>
#   e.g. ghcr.io/xiaocongyu66/sharkey-dev:latest
#
# Tags:
#   - latest          (default branch only)
#   - <package.json version>  e.g. 2025.5.2-dev
#   - sha-<short>     e.g. sha-7bd5e01
#   - branch name     e.g. main (sanitized)
#   - git tag         when building a release tag
#
# Requirements:
#   - Settings → Actions → General → Workflow permissions: Read and write
#   - First package may need linking under Packages after the first push

name: Docker

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
      - '20*'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/**'
      - 'locales/**'
      - 'sharkey-locales/**'
      - 'scripts/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
      push:
        description: 'Push image to GHCR (false = build only)'
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build${{ github.event_name == 'pull_request' && ' (no push)' || ' & push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        if: contains(github.event.inputs.platforms || 'linux/amd64', 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push != 'false')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name and version
        id: prep
        run: |
          set -eux
          # GHCR / OCI require lowercase repository names
          IMAGE_NAME="${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          VERSION=$(node -p "require('./package.json').version")
          # Docker tag: [a-zA-Z0-9_.-] — collapse invalid chars
          VERSION_TAG=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g')
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE_NAME}"
          echo "Version tag: ${VERSION_TAG}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          # Do not use type=semver here: package.json uses versions like 2025.5.2-dev
          # which are not valid SemVer and make metadata-action fail validation.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ steps.prep.outputs.version_tag }},enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=Sharkey
            org.opencontainers.image.description=Sharkey (Misskey-based) Fediverse server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Resolve platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.platforms }}" ]; then
            echo "value=${{ github.event.inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Should push?
        id: push
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.push }}" = "false" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: ${{ steps.push.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        if: steps.push.outputs.value == 'true'
        run: |
          {
            echo "### Docker image pushed"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Pull example:"
            echo ""
            echo '```bash'
            echo "docker pull ${{ steps.prep.outputs.image }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
