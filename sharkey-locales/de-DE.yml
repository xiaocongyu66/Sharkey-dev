authorizedFetchSection: "Authorized Fetch"
authorizedFetchLabel: "Unsignierte ActivityPub-Anfragen zulassen:"
authorizedFetchDescription: "Diese Einstellung steuert das Verhalten, wenn eine entfernte Instanz oder ein entfernter Benutzer versucht, auf deine Inhalte zuzugreifen, ohne seine Identität zu bestätigen. Wenn sie deaktiviert ist, kann jeder Remote-Benutzer auf dein Profil und deine Beiträge zugreifen - auch wenn er blockiert oder deföderiert wurde."
_authorizedFetchValue:
  never: "Niemals"
  always: "Immer"
  essential: "Nur für wesentliche Metadaten"
  staff: "Empfehlung der Administratoren verwenden"
_authorizedFetchValueDescription:
  never: "Alle unsignierten Anfragen blockieren. Verbessert den Datenschutz und macht die Blockierung effektiver, ist aber nicht mit sehr alter oder ungewöhnlicher Instanzsoftware kompatibel."
  always: "Erlaubt alle unsignierten Anfragen. Bietet die größte Kompatibilität mit anderen Instanzen, reduziert aber die Privatsphäre und schwächt vorhandene Blockierungen."
  essential: "Erlaubt einige begrenzte unsignierte Anfragen. Bietet eine Mischung aus \"Niemals\" und \"Immer\", indem nur die minimalen Profil-Metadaten offengelegt werden, die für die Föderation mit älterer Software erforderlich sind."
  staff: "Verwende den von den Administratoren der Instanz empfohlenen Standardwert von \"{value}\"."
authorizedFetchLegacyWarning: "Die Konfigurationseigenschaft 'checkActivityPubGetSignature' ist veraltet und wurde durch die neue Einstellung „Authorized Fetch“ ersetzt. Bitte entferne sie aus deiner Konfigurationsdatei."

