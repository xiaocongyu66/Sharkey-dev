introMisskey: 'Xin chào! Sharkey là một nền tảng tiểu blog phi tập trung mã nguồn mở.

  Viết "tút" để chia sẻ những suy nghĩ của bạn 📡

  Bằng "biểu cảm", bạn có thể bày tỏ nhanh chóng cảm xúc của bạn với các tút 👍

  Hãy khám phá một thế giới mới! 🚀'
