aboutMisskey: Về Sharkey
initialPasswordForSetupDescription: 'Nếu bạn tự cài đặt Sharkey, hãy sử dụng mật khẩu ban đầu của bạn đã nhập trong tệp cấu hình.

  Nếu bạn đang sử dụng dịch vụ nào đó giống như dịch vụ lưu trữ của Sharkey, hãy sử dụng mật khẩu ban đầu được cung cấp.

  Nếu bạn chưa đặt mật khẩu ban đầu, vui lòng để trống và tiếp tục.'
