_aiTranslation:
  title: AI translation
  info: OpenAI-compatible translation for notes and chat. Shared or separate API keys; optional user keys. Uncensored mode uses a SillyTavern jailbreak stack (main + nsfw + post-history), not a polite translate request.
  enableNotes: Enable note translation
  enableNotesCaption: When on, notes/translate can use AI (alongside DeepL/Libre if configured).
  enableChat: Enable chat translation
  enableChatCaption: When on, users can translate chat/room messages via AI.
  useShared: Share credentials for notes + chat
  useSharedCaption: Off = configure notes and chat endpoints separately.
  allowUserKey: Allow local user AI endpoint
  allowUserKeyCaption: Users may configure base URL / key / model in the browser only. Credentials are never stored or used by the server (browser → user API).
  preferAi: Prefer AI over DeepL/Libre for notes
  preferAiCaption: If AI fails, falls back to classic translators when available.
  uncensored: SillyTavern jailbreak stack
  uncensoredCaption: 'Uses ST-style layers: Main + NSFW/Auxiliary + Post-History Jailbreak (not a polite “please translate”). Retries once if the model still refuses.'
  jailbreakPrompt: Custom jailbreak / PHI (optional)
  jailbreakPromptCaption: Overrides the built-in Post-History Instructions slot (SillyTavern “jailbreak”). Leave empty for the built-in PHI.
  selective: Selective translation by default
  selectiveCaption: Only translate segments not already in the target language (e.g. EN parts → ZH in mixed text).
  cacheEnabled: Cache by content hash
  cacheEnabledCaption: Same source text + target language reuses the previous AI result (saves cost). Expired entries auto-delete.
  cacheTtl: Cache TTL (seconds)
  cacheTtlCaption: Auto-delete after this many seconds. Min 60, max 2592000 (30 days). Default 604800 (7 days).
  sharedCreds: Shared API
  notesCreds: Notes API
  chatCreds: Chat API
  baseUrl: API base URL
  baseUrlCaption: e.g. https://api.openai.com/v1 or https://api.x.ai/v1
  apiKey: API key
  apiKeyCaption: Leave blank when saving to keep the current key.
  model: Model
  apiStyle: API style
  apiStyleAuto: Auto
  timeout: Timeout (ms)
  systemPrompt: Custom system prompt (optional)
  systemPromptCaption: If set, replaces the entire ST stack with this single system prompt. Leave empty to use Main+NSFW+Jailbreak layers.
